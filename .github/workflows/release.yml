name: Generate and Release

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  generate:
    name: Generate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cantools

      - name: Generate code
        run: |
          python scripts/generate_code.py

  release:
    name: Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: generate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cantools

      - name: Generate code
        run: |
          python scripts/generate_code.py

      - name: Determine new version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l | sort -V | tail -n 1)

          if [ -z "$LATEST_TAG" ]; then
            VERSION="1"
          else
            VERSION=$((LATEST_TAG + 1))
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update library.json with new version
        run: |
          jq --arg v "$VERSION" '.version = $v' library.json > tmp.json
          mv tmp.json library.json

      - name: Commit generated files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add src/ library.json
          git commit -m "Auto-generate code and bump version to $VERSION" || echo "No changes"

      - name: Push changes
        run: git push

      - name: Create and push tag
        run: |
          git tag "$VERSION" || echo "Tag exists"
          git push origin "$VERSION" || echo "Tag already pushed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            src/**
